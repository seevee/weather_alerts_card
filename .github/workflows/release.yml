name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Create backwards-compatible copy under old name
        run: cp dist/weather-alerts-card.js dist/nws-alerts-card.js
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/weather-alerts-card.js
            dist/nws-alerts-card.js
