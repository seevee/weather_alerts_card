<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Alerts Card – Unavailable Behavior</title>
  <style>
    /* ---- HA theme variables, toggled via .theme-light / .theme-dark on the canvas ---- */
    .theme-light {
      --primary-text-color: #212121;
      --secondary-text-color: #727272;
      --primary-background-color: #fafafa;
      --secondary-background-color: #e5e5e5;
      --card-background-color: #ffffff;
      --divider-color: rgba(0, 0, 0, 0.12);
      --error-color: #db4437;
      --warning-color: #ffa600;
      --info-color: #4f86f7;
      --text-primary-color: #ffffff;
      --rgb-primary-text-color: 33, 33, 33;
      --ha-card-box-shadow:
        0px 2px 1px -1px rgba(0, 0, 0, 0.2),
        0px 1px 1px 0px rgba(0, 0, 0, 0.14),
        0px 1px 3px 0px rgba(0, 0, 0, 0.12);
      --canvas-bg: #f0f0f0;
      --label-color: rgba(0, 0, 0, 0.45);
      --group-color: rgba(0, 0, 0, 0.62);
      --empty-color: rgba(0, 0, 0, 0.28);
      --empty-border: rgba(0, 0, 0, 0.14);
    }
    .theme-dark {
      --primary-text-color: #e1e1e1;
      --secondary-text-color: #9b9b9b;
      --primary-background-color: #111111;
      --secondary-background-color: #202020;
      --card-background-color: #1c1c1e;
      --divider-color: rgba(225, 225, 225, 0.12);
      --error-color: #cf6679;
      --warning-color: #e68900;
      --info-color: #4f86f7;
      --text-primary-color: #ffffff;
      --rgb-primary-text-color: 225, 225, 225;
      --ha-card-box-shadow:
        0px 2px 1px -1px rgba(0, 0, 0, 0.5),
        0px 1px 1px 0px rgba(0, 0, 0, 0.4),
        0px 1px 3px 0px rgba(0, 0, 0, 0.3);
      --canvas-bg: #0d1117;
      --label-color: rgba(255, 255, 255, 0.45);
      --group-color: rgba(255, 255, 255, 0.68);
      --empty-color: rgba(255, 255, 255, 0.28);
      --empty-border: rgba(255, 255, 255, 0.14);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Roboto, "Noto Sans", sans-serif;
    }

    .unavailable-canvas {
      background: var(--canvas-bg);
      padding: 32px 28px 28px;
      width: 1300px;
    }

    /* Full behavior matrix: rows = breakage condition, columns = the three
       unavailableBehavior modes. Every cell is populated so the grid reads as
       exhaustive. */
    .matrix {
      display: grid;
      grid-template-columns: 190px 1fr 1fr 1fr;
      column-gap: 24px;
      row-gap: 22px;
      align-items: start;
    }

    .corner { }

    .col-head {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding-bottom: 4px;
      border-bottom: 2px solid var(--divider-color);
    }
    .col-head .mode {
      color: var(--group-color);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .col-head .desc {
      color: var(--label-color);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .row-head {
      padding-top: 14px;
      color: var(--group-color);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
    }
    .row-head small {
      display: block;
      color: var(--label-color);
      font-size: 11px;
      font-weight: 500;
      margin-top: 3px;
    }

    .cell {
      min-width: 0;
      position: relative;
    }
    .cell .card-inner {
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* Placeholder behind a card that hides itself (host display:none), so the
       cell reads as an intentional absence rather than a broken render. */
    .cell.stack { min-height: 76px; }
    .empty-hint {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 76px;
      border: 1px dashed var(--empty-border);
      border-radius: 12px;
      color: var(--empty-color);
      font-size: 13px;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="unavailable-canvas" id="unavailable-canvas">
    <div class="matrix">

      <!-- Header row -->
      <div class="corner"></div>
      <div class="col-head"><span class="mode">Message</span><span class="desc">Names the source</span></div>
      <div class="col-head"><span class="mode">Compact</span><span class="desc">Icon only</span></div>
      <div class="col-head"><span class="mode">Hide</span><span class="desc">Indicator off (opt-out)</span></div>

      <!-- Row 1: one source down, no active alerts -->
      <div class="row-head">One source down<small>no active alerts</small></div>
      <div class="cell"><div class="card-inner"><weather-alerts-card id="card-u-r1-msg"></weather-alerts-card></div></div>
      <div class="cell"><div class="card-inner"><weather-alerts-card id="card-u-r1-cmp"></weather-alerts-card></div></div>
      <div class="cell"><div class="card-inner"><weather-alerts-card id="card-u-r1-hide"></weather-alerts-card></div></div>

      <!-- Row 2: two sources down, no active alerts (count badge) -->
      <div class="row-head">Two sources down<small>no active alerts</small></div>
      <div class="cell"><div class="card-inner"><weather-alerts-card id="card-u-r2-msg"></weather-alerts-card></div></div>
      <div class="cell"><div class="card-inner"><weather-alerts-card id="card-u-r2-cmp"></weather-alerts-card></div></div>
      <div class="cell"><div class="card-inner"><weather-alerts-card id="card-u-r2-hide"></weather-alerts-card></div></div>

      <!-- Row 3: one source down AND an active alert (row 3) -->
      <div class="row-head">Source down<small>active alert present</small></div>
      <div class="cell"><div class="card-inner"><weather-alerts-card id="card-u-r3-msg"></weather-alerts-card></div></div>
      <div class="cell"><div class="card-inner"><weather-alerts-card id="card-u-r3-cmp"></weather-alerts-card></div></div>
      <div class="cell"><div class="card-inner"><weather-alerts-card id="card-u-r3-hide"></weather-alerts-card></div></div>

      <!-- Row 4: hideNoAlerts + two sources down — badge overrides the hide;
           only `hide` removes the card entirely. -->
      <div class="row-head">hideNoAlerts set<small>two sources down</small></div>
      <div class="cell"><div class="card-inner"><weather-alerts-card id="card-u-r4-msg"></weather-alerts-card></div></div>
      <div class="cell"><div class="card-inner"><weather-alerts-card id="card-u-r4-cmp"></weather-alerts-card></div></div>
      <div class="cell stack">
        <div class="empty-hint">Card hidden</div>
        <div class="card-inner"><weather-alerts-card id="card-u-r4-hide"></weather-alerts-card></div>
      </div>

    </div>
  </div>

  <script type="module">
    import '/dist/weather-alerts-card.js';

    // ---- ha-card stub ----
    class HaCard extends HTMLElement {
      set header(v) {}
      constructor() {
        super();
        this.attachShadow({ mode: 'open' });
        this.shadowRoot.innerHTML = `
          <style>
            :host {
              display: block;
              background: var(--ha-card-background, var(--card-background-color, white));
              border-radius: var(--ha-card-border-radius, 12px);
              box-shadow: var(--ha-card-box-shadow);
              overflow: hidden;
            }
          </style>
          <slot></slot>
        `;
      }
    }
    customElements.define('ha-card', HaCard);

    // ---- ha-icon stub ----
    class HaIcon extends HTMLElement {
      static get observedAttributes() { return ['icon']; }
      constructor() {
        super();
        this.attachShadow({ mode: 'open' });
      }
      connectedCallback() { this._render(); }
      attributeChangedCallback() { this._render(); }

      _render() {
        const icon = this.getAttribute('icon') || '';
        const path = (window.__MDI_ICONS__ || {})[icon];
        const size = this.style.width || 'var(--mdc-icon-size, 24px)';
        this.style.display = 'inline-flex';
        this.style.alignItems = 'center';
        this.style.justifyContent = 'center';
        this.shadowRoot.innerHTML = path
          ? `<svg viewBox="0 0 24 24"
               style="width:${size};height:${size};display:block;fill:currentColor">
               <path d="${path}"/>
             </svg>`
          : `<svg viewBox="0 0 24 24"
               style="width:${size};height:${size};display:block;fill:currentColor">
               <circle cx="12" cy="12" r="9"/>
             </svg>`;
      }
    }
    customElements.define('ha-icon', HaIcon);

    // ---- Deterministic timestamps (must match SCREENSHOT_NOW in screenshot.js) ----
    const NOW = Date.UTC(2025, 5, 15, 20, 0, 0);
    const H = 3600 * 1000;
    const iso = (offsetMs) => new Date(NOW + offsetMs).toISOString();

    // An obviously-fake active alert (card-preview philosophy — no real event
    // names or alarming language). Renders in Row 3 so the degraded badge is
    // shown sitting above live content.
    const ACTIVE_ALERT = {
      ID: 'urn:oid:2.49.0.1.840.0.screenshot-unavail-1',
      Event: 'Tornado of Compliments',
      Severity: 'Extreme',
      Certainty: 'Observed',
      Urgency: 'Immediate',
      Sent: iso(-2 * H),
      Onset: iso(-2 * H),
      Ends: iso(1.5 * H),
      Expires: iso(1.5 * H),
      Headline: 'SWIRLING WAVE OF KIND WORDS EXPECTED THROUGH THIS AFTERNOON',
      AreaDesc: 'Pleasantville; Sunnyside',
      Description: 'A swirling wave of kind words was observed near Pleasantville. This is sample data for the card preview.',
      Instruction: 'Stay calm and enjoy the show! No real action is needed.',
      URL: '',
      AffectedZones: ['https://api.weather.gov/zones/county/SAM001'],
    };

    // ---- Mock states ----
    // Broken sensors: unavailable/unknown + no parseable alert. friendly_name
    // drives the "named" badge; falling back to the entity id otherwise.
    const MOCK_HASS = {
      locale: { language: 'en', time_format: '12', date_format: 'MDY' },
      config: { time_zone: 'America/Denver' },
      states: {
        'sensor.nws_alerts':   { state: 'unavailable', attributes: { friendly_name: 'Sample County NWS' } },
        'sensor.dwd_warnings': { state: 'unknown',     attributes: { friendly_name: 'Demo Region DWD' } },
        'sensor.nws_quiet':    { state: '0', attributes: { Alerts: [], friendly_name: 'Backup Sensor' } },
        'sensor.nws_active':   { state: '1', attributes: { Alerts: [ACTIVE_ALERT], friendly_name: 'Primary NWS' } },
      },
    };

    function wire(id, config) {
      const card = document.getElementById(id);
      card.setConfig({
        type: 'custom:weather-alerts-card',
        animations: false,
        ...config,
      });
      card.hass = MOCK_HASS;
      return card;
    }

    // Row 1 — one source down, one quiet, no active alerts.
    const down1 = { entity: 'sensor.nws_alerts', entities: ['sensor.nws_quiet'] };
    wire('card-u-r1-msg',  { ...down1 });
    wire('card-u-r1-cmp',  { ...down1, unavailableBehavior: 'compact' });
    wire('card-u-r1-hide', { ...down1, unavailableBehavior: 'hide' });

    // Row 2 — two sources down, one quiet, no active alerts (count badge).
    const down2 = { entity: 'sensor.nws_alerts', entities: ['sensor.dwd_warnings', 'sensor.nws_quiet'] };
    wire('card-u-r2-msg',  { ...down2 });
    wire('card-u-r2-cmp',  { ...down2, unavailableBehavior: 'compact' });
    wire('card-u-r2-hide', { ...down2, unavailableBehavior: 'hide' });

    // Row 3 — one source down + one source carrying an active alert (row 3).
    const withAlert = { entity: 'sensor.nws_alerts', entities: ['sensor.nws_active'] };
    wire('card-u-r3-msg',  { ...withAlert });
    wire('card-u-r3-cmp',  { ...withAlert, unavailableBehavior: 'compact' });
    wire('card-u-r3-hide', { ...withAlert, unavailableBehavior: 'hide' });

    // Row 4 — hideNoAlerts + two sources down. A visible badge overrides the
    // empty-state hide (message/compact stay on screen); only `hide` removes it.
    const down2Hidden = { entity: 'sensor.nws_alerts', entities: ['sensor.dwd_warnings'], hideNoAlerts: true };
    wire('card-u-r4-msg',  { ...down2Hidden });
    wire('card-u-r4-cmp',  { ...down2Hidden, unavailableBehavior: 'compact' });
    wire('card-u-r4-hide', { ...down2Hidden, unavailableBehavior: 'hide' });
  </script>
</body>
</html>
