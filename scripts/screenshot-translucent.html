<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Alerts Card – Translucent Theme (compounding A/B)</title>
  <style>
    /* ---- HA theme variables, toggled via .theme-light / .theme-dark on the canvas ----
       Each theme declares a *translucent* --ha-card-background so the card surface
       is see-through, exercising the transparency fix from #215. --translucent-bg is
       a deliberately vivid canvas backdrop so any translucency is obvious: if the
       inner alert bodies double-paint the surface, they read "solid"; if they are
       transparent (the fix), the backdrop bleeds through them at a single alpha. */
    .theme-light {
      --primary-text-color: #1a1c22;
      --secondary-text-color: #4a4e59;
      --primary-background-color: #fafafa;
      --secondary-background-color: rgba(0, 0, 0, 0.08);
      --card-background-color: #ffffff;
      --divider-color: rgba(0, 0, 0, 0.14);
      --error-color: #db4437;
      --warning-color: #ffa600;
      --info-color: #4f86f7;
      --text-primary-color: #ffffff;
      --rgb-primary-text-color: 26, 28, 34;
      --ha-card-box-shadow:
        0px 2px 1px -1px rgba(0, 0, 0, 0.2),
        0px 1px 1px 0px rgba(0, 0, 0, 0.14),
        0px 1px 3px 0px rgba(0, 0, 0, 0.12);
      --ha-card-background: rgba(255, 255, 255, 0.55);
      --translucent-bg:
        radial-gradient(circle at 18% 20%, #ffd36e 0%, transparent 46%),
        radial-gradient(circle at 85% 25%, #7ec8ff 0%, transparent 46%),
        radial-gradient(circle at 55% 92%, #7ef0c4 0%, transparent 52%),
        repeating-linear-gradient(45deg, #eef1f6 0 22px, #e2e7f0 22px 44px);
      --translucent-label-color: rgba(0, 0, 0, 0.6);
      --translucent-caption-color: rgba(0, 0, 0, 0.5);
    }
    .theme-dark {
      --primary-text-color: #f2f4f8;
      --secondary-text-color: #b8c0cc;
      --primary-background-color: #0b0e14;
      --secondary-background-color: rgba(255, 255, 255, 0.10);
      --card-background-color: #1c1c1e;
      --divider-color: rgba(255, 255, 255, 0.16);
      --error-color: #cf6679;
      --warning-color: #e68900;
      --info-color: #6aa8ff;
      --text-primary-color: #ffffff;
      --rgb-primary-text-color: 242, 244, 248;
      --ha-card-box-shadow:
        0px 8px 24px rgba(0, 0, 0, 0.35);
      --ha-card-background: rgba(28, 32, 44, 0.55);
      --translucent-bg:
        radial-gradient(circle at 18% 20%, #ff5f6d 0%, transparent 45%),
        radial-gradient(circle at 85% 28%, #2ec5ff 0%, transparent 45%),
        radial-gradient(circle at 55% 92%, #17e3a1 0%, transparent 50%),
        repeating-linear-gradient(45deg, #12151c 0 22px, #191d27 22px 44px);
      --translucent-label-color: rgba(255, 255, 255, 0.92);
      --translucent-caption-color: rgba(255, 255, 255, 0.72);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Roboto, "Noto Sans", sans-serif;
    }

    .translucent-canvas {
      background: var(--translucent-bg);
      padding: 32px 28px 28px;
      display: flex;
      gap: 28px;
      width: 1080px;
    }

    .showcase {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .section-label {
      color: var(--translucent-label-color);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
    }

    .section-caption {
      color: var(--translucent-caption-color);
      font-size: 12px;
      line-height: 1.4;
      margin-bottom: 14px;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
    }

    .card-wrapper { width: 100%; }
  </style>
</head>
<body>

  <div class="translucent-canvas" id="translucent-canvas">

    <!-- Left: the pre-fix compounding, reproduced purely via the token by
         painting the inner alert body with the same translucent surface. -->
    <div class="showcase">
      <div class="section-label">Before &middot; compounding</div>
      <div class="section-caption">Alert bodies repaint the card surface, so the theme alpha lands twice and the bodies read &ldquo;solid.&rdquo;</div>
      <div class="card-wrapper">
        <weather-alerts-card id="card-translucent-before"></weather-alerts-card>
      </div>
    </div>

    <!-- Right: the default v3.2+ behaviour — transparent inner reveals the
         single painted outer surface, so the theme alpha lands once. -->
    <div class="showcase">
      <div class="section-label">After &middot; transparent inner</div>
      <div class="section-caption">Alert bodies are transparent and reveal the one painted surface, so the backdrop shows through at the theme&rsquo;s declared alpha.</div>
      <div class="card-wrapper">
        <weather-alerts-card id="card-translucent-after"></weather-alerts-card>
      </div>
    </div>

  </div>

  <script type="module">
    import '/dist/weather-alerts-card.js';
    import { ALERTS } from '/scripts/screenshot-fixtures.js';

    // ---- ha-card stub ----
    class HaCard extends HTMLElement {
      set header(v) {}
      constructor() {
        super();
        this.attachShadow({ mode: 'open' });
        this.shadowRoot.innerHTML = `
          <style>
            :host {
              display: block;
              background: var(--ha-card-background, var(--card-background-color, white));
              border-radius: var(--ha-card-border-radius, 12px);
              box-shadow: var(--ha-card-box-shadow);
              overflow: hidden;
            }
          </style>
          <slot></slot>
        `;
      }
    }
    customElements.define('ha-card', HaCard);

    // ---- ha-icon stub ----
    class HaIcon extends HTMLElement {
      static get observedAttributes() { return ['icon']; }
      constructor() {
        super();
        this.attachShadow({ mode: 'open' });
      }
      connectedCallback() { this._render(); }
      attributeChangedCallback() { this._render(); }

      _render() {
        const icon = this.getAttribute('icon') || '';
        const path = (window.__MDI_ICONS__ || {})[icon];
        const size = this.style.width || 'var(--mdc-icon-size, 24px)';
        this.style.display = 'inline-flex';
        this.style.alignItems = 'center';
        this.style.justifyContent = 'center';
        this.shadowRoot.innerHTML = path
          ? `<svg viewBox="0 0 24 24"
               style="width:${size};height:${size};display:block;fill:currentColor">
               <path d="${path}"/>
             </svg>`
          : `<svg viewBox="0 0 24 24"
               style="width:${size};height:${size};display:block;fill:currentColor">
               <circle cx="12" cy="12" r="9"/>
             </svg>`;
      }
    }
    customElements.define('ha-icon', HaIcon);

    // ---- Mock hass ----
    const ENTITY = 'sensor.nws_alerts_alerts';
    const MOCK_HASS = {
      locale: { language: 'en', time_format: '12', date_format: 'MDY' },
      config: { time_zone: 'America/Denver' },
      states: {
        [ENTITY]: {
          state: String(ALERTS.length),
          attributes: { Alerts: ALERTS },
        },
      },
    };

    const CONFIG = {
      type: 'custom:weather-alerts-card',
      entity: ENTITY,
      animations: false,
      colorTheme: 'severity',
    };

    // ---- Wire up cards ----

    // Left: reproduce the pre-fix compounding purely via the new token — paint
    // the inner alert body with the same translucent surface as the outer card.
    const before = document.getElementById('card-translucent-before');
    before.setConfig(CONFIG);
    before.hass = MOCK_HASS;
    before.style.setProperty('--wac-alert-background', 'var(--ha-card-background)');

    // Right: default behaviour — no override, --wac-alert-background: transparent.
    const after = document.getElementById('card-translucent-after');
    after.setConfig(CONFIG);
    after.hass = MOCK_HASS;
  </script>
</body>
</html>
